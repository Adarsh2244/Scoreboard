<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js"defer></script>
</head>
<body>
    <div class="container">
        <div class="home">
            <h3 class="home_name">Home</h3>
            <div class="home_team">
                <p id="home_score">0</p>
            </div>
            <div class="home_scores">
                <button onclick="homeaddone()">+1</button>
                <button onclick="homeaddtwo()">+2</button>
                <button onclick="homeaddthree()">+3</button>
            </div>
        </div>
        <div class="Guest">
            <h3 class="guest_name">Away</h3>
            <div class="guest_team">
                <p id="guest_score">0</p>
            </div>
            <div class="guest_scores">
                <button onclick="guestaddone()">+1</button>
                <button onclick="guestaddtwo()">+2</button>
                <button onclick="guestaddthree()">+3</button>
            </div>
        </div>
    </div>
</body>
</html>
